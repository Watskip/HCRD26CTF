<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kill3rTrick Telecom - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-zinc-950 flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <!-- Background Decor -->
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-fuchsia-600/10 rounded-full blur-[100px]"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-violet-600/10 rounded-full blur-[100px]"></div>

    <div
        class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl relative z-10 overflow-hidden">

        <div class="h-2 w-full bg-gradient-to-r from-fuchsia-500 to-violet-600"></div>

        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-fuchsia-500/10 mb-4">
                    <svg class="w-6 h-6 text-fuchsia-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">Acceso Corporativo</h2>
                <p class="text-sm text-slate-400">Kill3rTrick Telecom S.A.</p>
            </div>

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Usuario</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 focus:border-transparent transition-all"
                        placeholder="Ingresa tu usuario">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-fuchsia-600 hover:bg-fuchsia-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-fuchsia-600 focus:ring-offset-slate-900 transition-colors mt-2">
                    Iniciar Sesión
                </button>
            </form>


        </div>

        <div class="bg-zinc-950/50 border-t border-zinc-800 p-4 text-center">
            <p class="text-xs text-zinc-500 font-mono">Created by <a href="https://github.com/mil4ne" target="_blank" class="text-fuchsia-400 hover:text-fuchsia-300 transition-colors font-bold">mil4ne</a></p>
        </div>
    </div>
</body>

</html>
