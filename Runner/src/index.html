<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Glider | HackConRD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevent scroll on mobile */
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
        }

        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border-left: 2px solid #0ff;
            border-right: 2px solid #0ff;
            background-color: transparent;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #score-display {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 32px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            z-index: 10;
        }

        #start-screen, #game-over-screen {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #0ff;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        #game-over-screen {
            display: none;
            border-color: #f0f;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 48px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            letter-spacing: 4px;
        }

        .subtitle {
            color: #f0f;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        button {
            background: transparent;
            color: #0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            padding: 15px 40px;
            border: 2px solid #0ff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
            box-shadow: inset 0 0 10px rgba(0,255,255,0.2), 0 0 10px rgba(0,255,255,0.2);
        }

        button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(0,255,255,0.5), 0 0 20px rgba(0,255,255,0.5);
        }

        button:active {
            transform: scale(0.95);
        }

        #game-over-screen h1 { color: #f0f; text-shadow: 0 0 20px #f0f; }
        #game-over-screen button { border-color: #f0f; color: #f0f; box-shadow: inset 0 0 10px rgba(255,0,255,0.2), 0 0 10px rgba(255,0,255,0.2); }
        #game-over-screen button:hover { background: rgba(255, 0, 255, 0.2); box-shadow: inset 0 0 20px rgba(255,0,255,0.5), 0 0 20px rgba(255,0,255,0.5); }

        #flag-container {
            margin-top: 20px;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 10px #fff;
            word-break: break-all;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    
    <div id="ui-layer">
        <div id="score-display">0000</div>
        
        <div id="start-screen">
            <h1>NEON GLIDER</h1>
            <div class="subtitle">PROJECT: IMPOSSIBLE FLIGHT</div>
            <p style="font-size: 12px; color: #aaa; margin-bottom: 30px;">
                MANTÉN PRESIONADO (CLIC / TOQUE / ESPACIO) PARA ELEVARTE.<br>
                SOBREVIVE HASTA 50 PARA DESBLOQUEAR EL NÚCLEO.<br><br>
                <span style="color:#f00;">ADVERTENCIA: Dificultad Excesiva.</span>
            </p>
            <button onclick="startGame()">INICIAR CONEXIÓN</button>
        </div>

        <div id="game-over-screen">
            <h1>SISTEMA CAÍDO</h1>
            <div class="subtitle">COLISIÓN DETECTADA</div>
            <p id="final-score" style="font-size: 24px; color: #fff; margin-bottom: 20px;">PUNTAJE: 0</p>
            <p style="font-size: 11px; color: #888; margin-bottom: 12px;">ESPACIO — REINTENTAR</p>
            <button onclick="resetGame()">REINTENTAR</button>
            <div id="flag-container"></div>
        </div>
    </div>
    
    <div class="scanlines"></div>
</div>

<script src="game.js?v=6"></script>
</body>
</html>
