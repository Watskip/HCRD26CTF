{% extends "base.html" %}
{% block title %}Omega — Login{% endblock %}
{% block body %}
<div class="omega-page">
  <div class="omega-brand">
    <div class="omega-logo">Ω</div>
    <h1>Iniciar sesión</h1>
    <p>Accede a tu cuenta Omega</p>
  </div>
  <div class="omega-card">
    {% if msg %}
    <p class="alert alert-error" role="alert">{{ msg }}</p>
    {% endif %}
    <form class="omega-form" method="POST">
      <div class="omega-field">
        <label for="username">Usuario</label>
        <input id="username" type="text" name="username" required autocomplete="username">
      </div>
      <div class="omega-field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit">Entrar</button>
    </form>
    <div class="omega-footer">
      <a href="/register">Crear una cuenta nueva</a>
    </div>
  </div>
</div>
{% endblock %}
